name: Deploy PWA a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evitar que se ejecuten deploys concurrentes
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos
        run: npm run typecheck

      - name: Build Vite (con base path del repo)
        # Si tu repo se llama "salud-7", el sitio queda en
        # https://<usuario>.github.io/salud-7/
        # Ajustá VITE_BASE según el nombre del repo.
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
