name: Deploy PWA a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evitar que se ejecuten deploys concurrentes
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TEMPORAL: deployamos un dist/ pre-construido localmente.
      - name: Verificar dist/ commiteado
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::dist/ no existe en el commit. El workflow espera que esté commiteado."
            exit 1
          fi
          echo "=== Contenido de dist/ ==="
          ls -la dist/

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
